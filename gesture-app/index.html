<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuraDraw | AI Hand Tracking</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Noto+Sans+Meroitic&family=Playwrite+NZ+Guides&display=swap" rel="stylesheet">

  <!-- MediaPipe Hands & Camera Utils JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <style>
    :root {
      --primary: #6366f1;
      --surface: rgba(24, 24, 27, 0.7);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text: #f4f4f5;
      --text-muted: #a1a1aa;
    }
    
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at top right, #1e1b4b, #09090b);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 2.5rem;
      background: rgba(9, 9, 11, 0.8);
      -webkit-backdrop-filter: blur(16px);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--glass-border);
      z-index: 10;
    }

    .logo {
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a5b4fc, #d8b4fe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.5px;
    }

    .nav-guide {
      display: flex;
      align-items: center;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      padding: 0.4rem 0.8rem;
      border-radius: 20px;
      transition: all 0.2s ease;
    }
    .nav-guide:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .container {
      display: flex;
      flex-direction: row;
      flex: 1;
      gap: 1.5rem;
      padding: 1.5rem 2.5rem;
      height: calc(100vh - 70px);
      box-sizing: border-box;
    }

    .sidebar {
      width: 340px;
      padding: 1.5rem;
      background: var(--surface);
      -webkit-backdrop-filter: blur(24px);
      backdrop-filter: blur(24px);
      border-radius: 20px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      overflow-y: auto;
      box-sizing: border-box;
    }

    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

    .section-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      font-weight: 600;
    }

    .color-grid {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .color-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
    }
    
    .color-btn:hover { transform: scale(1.15); }
    .color-btn.active {
      border-color: white;
      transform: scale(1.1);
      box-shadow: 0 0 12px currentColor;
    }

    .color-picker-wrapper {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
      display: inline-block;
      box-sizing: border-box;
    }
    .color-picker-wrapper:hover { transform: scale(1.15); }
    .color-picker-wrapper.active {
      border-color: white;
      transform: scale(1.1);
      box-shadow: 0 0 12px var(--current-custom-color, white);
    }
    .color-picker-wrapper input[type="color"] {
      position: absolute;
      top: -10px;
      left: -10px;
      width: 50px;
      height: 50px;
      opacity: 0;
      cursor: pointer;
    }

    .action-btn {
      padding: 0.5rem 0.8rem;
      border-radius: 10px;
      border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      font-weight: 500;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      flex: 1 1 45%;
    }

    .action-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-1px);
    }

    .action-btn.active {
      background: var(--primary);
      border-color: var(--primary);
    }

    .action-btn.danger {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.2);
      color: #fca5a5;
    }
    .action-btn.danger:hover { background: rgba(239, 68, 68, 0.15); }
    
    .action-btn.success {
      background: rgba(16, 185, 129, 0.1);
      border-color: rgba(16, 185, 129, 0.2);
      color: #6ee7b7;
    }
    .action-btn.success:hover { background: rgba(16, 185, 129, 0.15); }

    .slider-container { width: 100%; }
    input[type=range] { width: 100%; accent-color: var(--primary); margin-top: 0.5rem; }
    
    .bg-segment {
      display: flex; background: rgba(0,0,0,0.4);
      border-radius: 10px; overflow: hidden;
      flex-wrap: wrap; border: 1px solid var(--glass-border);
    }
    .bg-btn {
      flex: 1 1 30%; padding: 0.4rem; border: none; background: transparent;
      color: var(--text-muted); cursor: pointer; font-size: 0.75rem;
      font-weight: 500; transition: all 0.2s;
    }
    .bg-btn:hover { color: white; background: rgba(255,255,255,0.05); }
    .bg-btn.active { background: var(--primary); color: white; }

    .feed-container {
      flex: 1;
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
      border: 1px solid var(--glass-border);
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Video and Canvas Overlay styles */
    #webcamVideo {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* mirror video */
      z-index: 1;
      transition: opacity 0.3s ease;
    }

    .drawing-canvas {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      top: 0;
      left: 0;
      pointer-events: none;
    }

    #drawingCanvas {
      z-index: 2;
    }

    #tempCanvas {
      z-index: 3;
    }

    /* Loading Overlay */
    .loading-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(9, 9, 11, 0.95);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      transition: opacity 0.5s ease;
    }
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      border-top-color: var(--primary);
      animation: spin 1s linear infinite;
    }
    .loading-text {
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
      text-align: center;
      line-height: 1.5;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.7);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .palette-modal {
      background: var(--surface);
      border: 1px solid var(--glass-border);
      padding: 1.5rem;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
      animation: modalPop 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes modalPop {
      0% { opacity: 0; transform: scale(0.95) translateY(10px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">AuraDraw ✨</div>
    <div style="display:flex; gap:1rem; align-items:center;">
      <div class="nav-guide" title="Draw">
        <span style="font-size:1.2rem; margin-right:0.4rem;">☝️</span>
        <span style="font-size:0.85rem; font-weight:600; color:var(--text-muted);">Draw</span>
      </div>
      <div class="nav-guide" title="Pause / Move Cursor">
        <span style="font-size:1.2rem; margin-right:0.4rem;">✌️</span>
        <span style="font-size:0.85rem; font-weight:600; color:var(--text-muted);">Pause</span>
      </div>
      <div class="nav-guide" title="Clear Canvas">
        <span style="font-size:1.2rem; margin-right:0.4rem;">🖐️</span>
        <span style="font-size:0.85rem; font-weight:600; color:var(--text-muted);">Clear</span>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="sidebar">
      <div>
        <div class="section-title">Brush Color</div>
        <div class="color-grid">
          <button class="color-btn active" style="background:#EF4444; color:#EF4444;" onclick="setColor('red', this)" title="Red Brush" aria-label="Red Brush"></button>
          <button class="color-btn" style="background:#3B82F6; color:#3B82F6;" onclick="setColor('blue', this)" title="Blue Brush" aria-label="Blue Brush"></button>
          <button class="color-btn" style="background:#10B981; color:#10B981;" onclick="setColor('green', this)" title="Green Brush" aria-label="Green Brush"></button>
          <button class="color-btn" style="background:#F59E0B; color:#F59E0B;" onclick="setColor('yellow', this)" title="Yellow Brush" aria-label="Yellow Brush"></button>
          <button class="color-btn" style="background:#8B5CF6; color:#8B5CF6;" onclick="setColor('purple', this)" title="Purple Brush" aria-label="Purple Brush"></button>
          <button class="color-btn" style="background:#EC4899; color:#EC4899;" onclick="setColor('pink', this)" title="Pink Brush" aria-label="Pink Brush"></button>
          <button class="color-btn" style="background:#06B6D4; color:#06B6D4;" onclick="setColor('cyan', this)" title="Cyan Brush" aria-label="Cyan Brush"></button>
          <button class="color-btn" style="background:#F97316; color:#F97316;" onclick="setColor('orange', this)" title="Orange Brush" aria-label="Orange Brush"></button>
          <button class="color-btn" style="background:#FFFFFF; color:#FFFFFF;" onclick="setColor('white', this)" title="White Brush" aria-label="White Brush"></button>
          <button class="color-btn" style="background:conic-gradient(red, yellow, lime, aqua, blue, magenta, red); color:white;" onclick="setColor('rainbow', this)" title="Rainbow Brush" aria-label="Rainbow Brush"></button>
          <div class="color-picker-wrapper" id="colorPickerWrapper" title="Custom RGB Color">
            <input type="color" id="customColorPicker" oninput="setCustomColor(this.value)" onchange="setCustomColor(this.value)" value="#ff0000" title="Custom color picker" aria-label="Custom color picker">
          </div>
          <button class="color-btn" style="background:conic-gradient(from 180deg, #1f2937, #111827); color:white; font-size:12px; border-radius:8px; width:auto; padding:0 10px; height:32px; border:1px solid rgba(255,255,255,0.2); font-weight:600;" onclick="openPaletteModal()" title="Advanced Hex Palette" aria-label="Advanced Hex Palette">🎨 Palette</button>
        </div>
      </div>

      <div>
        <div class="section-title">Brush Style</div>
        <div class="slider-container">
          <label style="font-size:0.8rem; color:#94A3B8; display:flex; justify-content:space-between;">
            <span>Thickness</span>
            <span id="brushSizeViewer">6px</span>
          </label>
          <input type="range" min="2" max="60" value="6" oninput="setThickness(this.value)" title="Brush thickness" aria-label="Brush thickness" />
        </div>
      </div>

      <div>
        <div class="section-title">Brush / Shape</div>
        <div class="bg-segment">
          <button class="style-btn bg-btn active" onclick="setStyle('normal', this)">Draw</button>
          <button class="style-btn bg-btn" onclick="setStyle('straight', this)">Line</button>
          <button class="style-btn bg-btn" onclick="setStyle('dotted', this)">Dotted</button>
          <button class="style-btn bg-btn" onclick="setStyle('rectangle', this)">Rect</button>
          <button class="style-btn bg-btn" onclick="setStyle('circle', this)">Circle</button>
        </div>
      </div>

      <div>
        <div class="section-title">Background</div>
        <div class="bg-segment">
          <button class="bg-mode-btn bg-btn active" onclick="setBg('camera', this)">Camera</button>
          <button class="bg-mode-btn bg-btn" onclick="setBg('black', this)">Black</button>
          <button class="bg-mode-btn bg-btn" onclick="setBg('white', this)">White</button>
        </div>
      </div>

      <div>
        <div class="section-title">Actions</div>
        <div style="display:flex; flex-direction: row; gap:0.5rem; flex-wrap: wrap;">
          <button class="action-btn" onclick="undo()">
            <span style="font-size:1.1rem;">↩️</span> Undo
          </button>
          <button class="action-btn" onclick="redo()">
            <span style="font-size:1.1rem;">↪️</span> Redo
          </button>
          <button class="action-btn" id="eraserBtn" onclick="setColor('eraser', this)">
            <span style="font-size:1.1rem;">🧽</span> Eraser
          </button>
          <button class="action-btn success" onclick="saveImage()">
            <span style="font-size:1.1rem;">💾</span> Save
          </button>
          <button class="action-btn danger" style="flex: 1 1 100%;" onclick="clearAll()">
            <span style="font-size:1.1rem;">🗑️</span> Clear All
          </button>
        </div>
      </div>
    </div>

    <div class="feed-container">
      <!-- Loading Overlay -->
      <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Initializing AI Hand Tracking Model...<br><span style="font-size: 0.85rem; color: var(--text-muted);">Please allow camera access when prompted.</span></div>
      </div>
      
      <!-- Video stream -->
      <video id="webcamVideo" autoplay playsinline muted></video>
      
      <!-- Overlaid Drawing Canvases -->
      <canvas id="drawingCanvas" class="drawing-canvas" width="1280" height="720"></canvas>
      <canvas id="tempCanvas" class="drawing-canvas" width="1280" height="720"></canvas>
    </div>
  </div>

  <!-- Palette Modal -->
  <div id="paletteModal" class="modal-overlay" style="display:none;">
    <div class="palette-modal">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
        <h3 style="margin:0; font-size:1.1rem; color:#fff;">Advanced Hex Palette</h3>
        <button onclick="closePaletteModal()" style="background:none; border:none; color:#94A3B8; font-size:1.5rem; cursor:pointer; line-height:1;">&times;</button>
      </div>
      <canvas id="hexPaletteCanvas" width="340" height="340" onclick="pickFromHexPalette(event)" style="cursor:crosshair; border-radius:50%;"></canvas>
    </div>
  </div>

  <script>
    // Canvas contexts
    const drawingCanvas = document.getElementById('drawingCanvas');
    const drawingCtx = drawingCanvas.getContext('2d');
    const tempCanvas = document.getElementById('tempCanvas');
    const tempCtx = tempCanvas.getContext('2d');
    const videoElement = document.getElementById('webcamVideo');

    // App state variables
    let currentDrawColor = '#EF4444'; // default red
    let drawThickness = 6;
    let lineStyle = 'normal'; // normal, straight, dotted, rectangle, circle
    let bgMode = 'camera'; // camera, black, white
    let isDrawing = false;
    let lostFrames = 0;
    const maxLostFrames = 6;
    const alpha = 0.65; // exponential smoothing factor

    // Coordinates state
    let prevX = null, prevY = null;
    let smoothX = null, smoothY = null;
    let startX = null, startY = null;
    let lastX = null, lastY = null;

    // Rainbow brush
    let rainbowHue = 0;
    function getRainbowColor() {
      rainbowHue = (rainbowHue + 2) % 360;
      return `hsl(${rainbowHue}, 100%, 50%)`;
    }

    // Undo / Redo stacks
    let undoStack = [];
    let redoStack = [];

    function pushUndo() {
      // Save canvas state
      undoStack.push(drawingCtx.getImageData(0, 0, drawingCanvas.width, drawingCanvas.height));
      if (undoStack.length > 25) {
        undoStack.shift();
      }
      redoStack = []; // Clear redo stack on new action
    }

    function undo() {
      if (undoStack.length > 0) {
        redoStack.push(drawingCtx.getImageData(0, 0, drawingCanvas.width, drawingCanvas.height));
        const state = undoStack.pop();
        drawingCtx.putImageData(state, 0, 0);
      }
    }

    function redo() {
      if (redoStack.length > 0) {
        undoStack.push(drawingCtx.getImageData(0, 0, drawingCanvas.width, drawingCanvas.height));
        const state = redoStack.pop();
        drawingCtx.putImageData(state, 0, 0);
      }
    }

    // Color controls
    function setColor(colorName, btn) {
      document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('colorPickerWrapper').classList.remove('active');
      document.getElementById('eraserBtn').classList.remove('active');

      if (colorName === 'eraser') {
        currentDrawColor = 'eraser';
        if (btn) btn.classList.add('active');
      } else if (colorName === 'rainbow') {
        currentDrawColor = 'rainbow';
        if (btn) btn.classList.add('active');
      } else {
        if (btn) btn.classList.add('active');
        if (colorName === 'red') currentDrawColor = '#EF4444';
        else if (colorName === 'blue') currentDrawColor = '#3B82F6';
        else if (colorName === 'green') currentDrawColor = '#10B981';
        else if (colorName === 'yellow') currentDrawColor = '#F59E0B';
        else if (colorName === 'purple') currentDrawColor = '#8B5CF6';
        else if (colorName === 'pink') currentDrawColor = '#EC4899';
        else if (colorName === 'cyan') currentDrawColor = '#06B6D4';
        else if (colorName === 'orange') currentDrawColor = '#F97316';
        else if (colorName === 'white') currentDrawColor = '#FFFFFF';
      }
    }

    function setCustomColor(hexColor) {
      document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('eraserBtn').classList.remove('active');
      
      const wrapper = document.getElementById('colorPickerWrapper');
      wrapper.classList.add('active');
      wrapper.style.setProperty('--current-custom-color', hexColor);
      currentDrawColor = hexColor;
    }

    // Thickness controls
    function setThickness(val) {
      document.getElementById('brushSizeViewer').innerText = val + 'px';
      drawThickness = parseInt(val);
    }

    // Style controls
    function setStyle(mode, btn) {
      document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      
      commitShape();
      lineStyle = mode;
      startX = null; startY = null;
      lastX = null; lastY = null;
      prevX = null; prevY = null;
    }

    // Background controls
    function setBg(mode, btn) {
      document.querySelectorAll('.bg-mode-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      
      bgMode = mode;
      const container = document.querySelector('.feed-container');
      
      if (mode === 'camera') {
        videoElement.style.opacity = '1';
        container.style.background = '#000';
      } else if (mode === 'black') {
        videoElement.style.opacity = '0';
        container.style.background = '#000000';
      } else if (mode === 'white') {
        videoElement.style.opacity = '0';
        container.style.background = '#ffffff';
      }
    }

    // Clear controls
    function clearAll() {
      pushUndo();
      drawingCtx.clearRect(0, 0, drawingCanvas.width, drawingCanvas.height);
      tempCtx.clearRect(0, 0, tempCanvas.width, tempCanvas.height);
      prevX = null; prevY = null;
      smoothX = null; smoothY = null;
      startX = null; startY = null;
      lastX = null; lastY = null;
      isDrawing = false;
    }

    // Modal Hex Palette
    function openPaletteModal() {
      document.getElementById('paletteModal').style.display = 'flex';
      drawHexPalette();
    }

    function closePaletteModal() {
      document.getElementById('paletteModal').style.display = 'none';
    }

    function drawHexagon(ctx, x, y, r, color) {
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const angle = Math.PI / 3 * i + Math.PI / 6;
        const hx = x + r * Math.cos(angle);
        const hy = y + r * Math.sin(angle);
        if (i === 0) ctx.moveTo(hx, hy);
        else ctx.lineTo(hx, hy);
      }
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
    }

    function drawHexPalette() {
      const canvas = document.getElementById('hexPaletteCanvas');
      const ctx = canvas.getContext('2d');
      const width = canvas.width;
      const height = canvas.height;
      
      ctx.clearRect(0, 0, width, height);
      
      const rings = 12;
      const hexRadius = (width / 2.2) / (rings * Math.sqrt(3));
      const cx = width / 2;
      const cy = height / 2;
      
      for (let q = -rings; q <= rings; q++) {
        let r1 = Math.max(-rings, -q - rings);
        let r2 = Math.min(rings, -q + rings);
        for (let r = r1; r <= r2; r++) {
          let x = cx + hexRadius * Math.sqrt(3) * (q + r/2);
          let y = cy + hexRadius * 3/2 * r;
          
          let angle = Math.atan2(r * Math.sqrt(3)/2, q + r/2);
          let dist = Math.sqrt(q*q + r*r + q*r) / rings; 
          let hue = angle * 180 / Math.PI;
          if (hue < 0) hue += 360;
          
          let lightness = 100 - dist * 50; 
          
          drawHexagon(ctx, x, y, hexRadius - 0.3, `hsl(${hue}, 100%, ${lightness}%)`);
        }
      }
    }

    function pickFromHexPalette(e) {
      const canvas = document.getElementById('hexPaletteCanvas');
      const ctx = canvas.getContext('2d');
      const rect = canvas.getBoundingClientRect();
      
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      
      const x = (e.clientX - rect.left) * scaleX;
      const y = (e.clientY - rect.top) * scaleY;
      
      const p = ctx.getImageData(x, y, 1, 1).data;
      if (p[3] === 0) return;
      
      const rgbToHex = (r, g, b) => "#" + (1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1);
      const hex = rgbToHex(p[0], p[1], p[2]);
      
      document.getElementById('customColorPicker').value = hex;
      setCustomColor(hex);
      closePaletteModal();
    }

    // Save Masterpiece Image
    function saveImage() {
      // Create offscreen canvas to merge background + drawing
      const mergeCanvas = document.createElement('canvas');
      mergeCanvas.width = drawingCanvas.width;
      mergeCanvas.height = drawingCanvas.height;
      const mergeCtx = mergeCanvas.getContext('2d');

      // Draw background
      if (bgMode === 'camera') {
        // Draw the mirrored webcam image to offscreen canvas
        mergeCtx.save();
        mergeCtx.translate(mergeCanvas.width, 0);
        mergeCtx.scale(-1, 1);
        // Draw video frame to cover the space
        mergeCtx.drawImage(videoElement, 0, 0, mergeCanvas.width, mergeCanvas.height);
        mergeCtx.restore();
      } else if (bgMode === 'black') {
        mergeCtx.fillStyle = '#000000';
        mergeCtx.fillRect(0, 0, mergeCanvas.width, mergeCanvas.height);
      } else {
        mergeCtx.fillStyle = '#ffffff';
        mergeCtx.fillRect(0, 0, mergeCanvas.width, mergeCanvas.height);
      }

      // Draw drawing canvas on top
      mergeCtx.drawImage(drawingCanvas, 0, 0);

      // Download trigger
      const link = document.createElement('a');
      link.download = 'auradraw_masterpiece.png';
      link.href = mergeCanvas.toDataURL('image/png');
      link.click();
    }

    // Commit active temp shape to permanent canvas
    function commitShape() {
      if (startX !== null && lastX !== null) {
        drawingCtx.save();
        
        // Handle eraser compositing
        if (currentDrawColor === 'eraser') {
          drawingCtx.globalCompositeOperation = 'destination-out';
          drawingCtx.strokeStyle = 'rgba(0,0,0,1)';
          drawingCtx.lineWidth = 40;
        } else {
          drawingCtx.globalCompositeOperation = 'source-over';
          drawingCtx.strokeStyle = currentDrawColor === 'rainbow' ? getRainbowColor() : currentDrawColor;
          drawingCtx.lineWidth = drawThickness;
        }
        
        drawingCtx.lineCap = 'round';
        drawingCtx.lineJoin = 'round';
        drawingCtx.beginPath();
        
        if (lineStyle === 'straight') {
          drawingCtx.moveTo(startX, startY);
          drawingCtx.lineTo(lastX, lastY);
        } else if (lineStyle === 'rectangle') {
          drawingCtx.strokeRect(startX, startY, lastX - startX, lastY - startY);
        } else if (lineStyle === 'circle') {
          const radius = Math.hypot(lastX - startX, lastY - startY);
          drawingCtx.arc(startX, startY, radius, 0, 2 * Math.PI);
        }
        
        drawingCtx.stroke();
        drawingCtx.restore();
        
        // Push state to undo stack
        pushUndo();

        // Reset variables
        startX = null; startY = null;
        lastX = null; lastY = null;
      }
    }

    // MediaPipe Hands detection handler
    function onHandResults(results) {
      // Clear temporary previews first
      tempCtx.clearRect(0, 0, tempCanvas.width, tempCanvas.height);

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const lm = results.multiHandLandmarks[0];
        
        // 1. Get raw and smoothed coordinates for index finger tip (landmark 8)
        const ix = (1 - lm[8].x) * drawingCanvas.width;
        const iy = lm[8].y * drawingCanvas.height;

        if (smoothX === null || smoothY === null) {
          smoothX = ix;
          smoothY = iy;
        } else {
          smoothX = alpha * ix + (1 - alpha) * smoothX;
          smoothY = alpha * iy + (1 - alpha) * smoothY;
        }

        // 2. Gesture checking: compute distance from wrist (landmark 0)
        const distW = (idx) => Math.hypot(lm[idx].x - lm[0].x, lm[idx].y - lm[0].y);
        
        const indexUp = distW(8) > distW(6);
        const middleUp = distW(12) > distW(10);
        const ringUp = distW(16) > distW(14);
        const pinkyUp = distW(20) > distW(18);
        const thumbUp = distW(4) > distW(2);

        const totalFingers = (indexUp ? 1 : 0) + (middleUp ? 1 : 0) + (ringUp ? 1 : 0) + (pinkyUp ? 1 : 0) + (thumbUp ? 1 : 0);

        // Define Modes
        const clearMode = (totalFingers === 5);
        const pauseMode = (indexUp && middleUp && !ringUp && !pinkyUp);
        const drawMode = indexUp && !pauseMode && !clearMode;

        // 3. Handle operations based on mode
        if (clearMode) {
          // Clear entire canvas
          clearAll();
        } else if (drawMode) {
          // Check if starting a new drawing segment
          if (!isDrawing) {
            pushUndo();
            isDrawing = true;
          }

          lostFrames = 0;

          // Freehand styles (normal, dotted)
          if (lineStyle === 'normal') {
            drawingCtx.save();
            if (currentDrawColor === 'eraser') {
              drawingCtx.globalCompositeOperation = 'destination-out';
              drawingCtx.strokeStyle = 'rgba(0,0,0,1)';
              drawingCtx.lineWidth = 40;
            } else {
              drawingCtx.globalCompositeOperation = 'source-over';
              drawingCtx.strokeStyle = currentDrawColor === 'rainbow' ? getRainbowColor() : currentDrawColor;
              drawingCtx.lineWidth = drawThickness;
            }
            drawingCtx.lineCap = 'round';
            drawingCtx.lineJoin = 'round';
            drawingCtx.beginPath();
            
            if (prevX === null) {
              prevX = smoothX;
              prevY = smoothY;
            }
            drawingCtx.moveTo(prevX, prevY);
            drawingCtx.lineTo(smoothX, smoothY);
            drawingCtx.stroke();
            drawingCtx.restore();

            prevX = smoothX;
            prevY = smoothY;
          } 
          else if (lineStyle === 'dotted') {
            drawingCtx.save();
            if (currentDrawColor === 'eraser') {
              drawingCtx.globalCompositeOperation = 'destination-out';
              drawingCtx.fillStyle = 'rgba(0,0,0,1)';
              if (prevX === null) {
                prevX = smoothX; prevY = smoothY;
                drawingCtx.beginPath();
                drawingCtx.arc(smoothX, smoothY, 20, 0, 2 * Math.PI);
                drawingCtx.fill();
              } else {
                const dist = Math.hypot(smoothX - prevX, smoothY - prevY);
                if (dist > 50) {
                  drawingCtx.beginPath();
                  drawingCtx.arc(smoothX, smoothY, 20, 0, 2 * Math.PI);
                  drawingCtx.fill();
                  prevX = smoothX; prevY = smoothY;
                }
              }
            } else {
              drawingCtx.globalCompositeOperation = 'source-over';
              drawingCtx.fillStyle = currentDrawColor === 'rainbow' ? getRainbowColor() : currentDrawColor;
              
              if (prevX === null) {
                prevX = smoothX; prevY = smoothY;
                drawingCtx.beginPath();
                drawingCtx.arc(smoothX, smoothY, drawThickness / 2, 0, 2 * Math.PI);
                drawingCtx.fill();
              } else {
                const dist = Math.hypot(smoothX - prevX, smoothY - prevY);
                if (dist > drawThickness * 2.5) {
                  drawingCtx.beginPath();
                  drawingCtx.arc(smoothX, smoothY, drawThickness / 2, 0, 2 * Math.PI);
                  drawingCtx.fill();
                  prevX = smoothX; prevY = smoothY;
                }
              }
            }
            drawingCtx.restore();
          } 
          // Shape styles (straight line, rectangle, circle)
          else if (lineStyle === 'straight' || lineStyle === 'rectangle' || lineStyle === 'circle') {
            if (startX === null) {
              startX = smoothX;
              startY = smoothY;
            }
            lastX = smoothX;
            lastY = smoothY;

            // Draw real-time preview on temp canvas
            tempCtx.save();
            if (currentDrawColor === 'eraser') {
              // Eraser shape preview represented as a translucent red outline
              tempCtx.strokeStyle = 'rgba(239, 68, 68, 0.4)';
              tempCtx.lineWidth = 2;
            } else {
              tempCtx.strokeStyle = currentDrawColor === 'rainbow' ? getRainbowColor() : currentDrawColor;
              tempCtx.lineWidth = drawThickness;
            }
            tempCtx.lineCap = 'round';
            tempCtx.lineJoin = 'round';
            tempCtx.beginPath();

            if (lineStyle === 'straight') {
              tempCtx.moveTo(startX, startY);
              tempCtx.lineTo(lastX, lastY);
            } else if (lineStyle === 'rectangle') {
              tempCtx.strokeRect(startX, startY, lastX - startX, lastY - startY);
            } else if (lineStyle === 'circle') {
              const radius = Math.hypot(lastX - startX, lastY - startY);
              tempCtx.arc(startX, startY, radius, 0, 2 * Math.PI);
            }
            tempCtx.stroke();
            tempCtx.restore();
          }

          // Draw active brush pointer (cursor) on temp canvas
          tempCtx.beginPath();
          tempCtx.arc(smoothX, smoothY, currentDrawColor === 'eraser' ? 20 : Math.max(4, drawThickness / 2), 0, 2 * Math.PI);
          tempCtx.fillStyle = currentDrawColor === 'eraser' ? 'rgba(255,255,255,0.3)' : (currentDrawColor === 'rainbow' ? getRainbowColor() : currentDrawColor);
          tempCtx.strokeStyle = '#ffffff';
          tempCtx.lineWidth = 1.5;
          tempCtx.fill();
          tempCtx.stroke();

        } else if (pauseMode) {
          // Pause / Move Cursor Mode
          isDrawing = false;
          
          // Commit any shape that was in progress
          commitShape();

          prevX = null;
          prevY = null;
          lostFrames = 0;

          // Draw indicator/pointer on temp canvas
          tempCtx.beginPath();
          tempCtx.arc(smoothX, smoothY, 8, 0, 2 * Math.PI);
          tempCtx.fillStyle = 'rgba(99, 102, 241, 0.85)'; // Indigo cursor
          tempCtx.strokeStyle = '#ffffff';
          tempCtx.lineWidth = 2;
          tempCtx.fill();
          tempCtx.stroke();
        }

      } else {
        // No hand detected
        isDrawing = false;
        lostFrames++;
        if (lostFrames > maxLostFrames) {
          commitShape();
          prevX = null; prevY = null;
          smoothX = null; smoothY = null;
        }
      }
    }

    // Initialize MediaPipe Hands model
    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.7
    });

    hands.onResults(onHandResults);

    // Initialize camera stream
    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await hands.send({image: videoElement});
      },
      width: 1280,
      height: 720
    });

    camera.start()
      .then(() => {
        // Smoothly fade out the loading overlay
        const loader = document.getElementById('loadingOverlay');
        loader.style.opacity = '0';
        setTimeout(() => {
          loader.style.display = 'none';
        }, 500);
      })
      .catch(err => {
        console.error("Camera initialisation error:", err);
        const text = document.querySelector('.loading-text');
        text.innerHTML = `
          <span style="color:#ef4444; font-weight:bold; font-size:1.1rem;">Webcam Access Blocked</span><br>
          <span style="font-size:0.85rem; color:var(--text-muted);">Please allow camera access in your browser settings and refresh the page to start drawing.</span>
        `;
        document.querySelector('.loading-spinner').style.display = 'none';
      });

  </script>
</body>
</html>
